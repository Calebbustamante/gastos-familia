<script>
/* ── Service Worker registration ── */
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => {
        console.log('[PWA] Service Worker registrado:', reg.scope);
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW.addEventListener('statechange', () => {
            if(newSW.state === 'installed' && navigator.serviceWorker.controller) {
              // New version available
              if(confirm('Hay una nueva versión disponible. ¿Actualizar ahora?')) {
                newSW.postMessage('skipWaiting');
                window.location.reload();
              }
            }
          });
        });
      })
      .catch(err => console.log('[PWA] Error SW:', err));
  });
}

/* ── Install prompt (Android) ── */
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.innerHTML = `
    <div style="position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9999;
      background:#10b981;color:#000;padding:14px 20px;border-radius:16px;
      display:flex;align-items:center;gap:12px;font-family:'Outfit',sans-serif;
      font-weight:700;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);
      max-width:340px;width:90%;cursor:pointer;" id="install-btn">
      <span style="font-size:22px">📲</span>
      <span style="flex:1">Instalar app en tu celular</span>
      <button onclick="document.getElementById('install-banner').remove()" 
        style="background:rgba(0,0,0,0.2);border:none;border-radius:8px;padding:4px 8px;
        cursor:pointer;color:#000;font-size:16px;font-weight:700;">×</button>
    </div>`;
  document.body.appendChild(banner);
  
  document.getElementById('install-btn').addEventListener('click', async () => {
    document.getElementById('install-banner').remove();
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('[PWA] Install outcome:', outcome);
    deferredPrompt = null;
  });
});

window.addEventListener('appinstalled', () => {
  console.log('[PWA] App instalada exitosamente');
  deferredPrompt = null;
});
</script>
